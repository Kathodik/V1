name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/V1
            git pull origin main
            cd frontend && npm install --legacy-peer-deps && npm run build
            cd ../backend && source /var/www/V1/venv/bin/activate && pip install -r requirements.txt
            pm2 restart all
